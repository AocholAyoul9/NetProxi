<header class="header">
  <div class="container">

    <!-- Logo -->
    <div class="logo">
      <a routerLink="/" class="logo-link">
        <span class="logo-icon"></span>
        <span class="logo-text">NetProxi</span>
      </a>
    </div>

    <!-- Navigation -->
    <nav class="nav" [class.active]="menuOpen()">
      <a routerLink="/" routerLinkActive="active" class="nav-link">Accueil</a>
      <a routerLink="/companies" routerLinkActive="active" class="nav-link">Entreprises</a>
      <a routerLink="/about" routerLinkActive="active" class="nav-link">À propos</a>
      <a routerLink="/contact" routerLinkActive="active" class="nav-link">Contact</a>
    </nav>

    <!-- Hamburger -->
    <button
      class="menu-toggle"
      (click)="toggleMenu()"
      aria-label="Toggle menu"
      [class.active]="menuOpen()">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>
</header>
