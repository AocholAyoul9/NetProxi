<header class="header">
  <div class="container">

    <!-- Logo -->
    <div class="logo">
      <a routerLink="/" class="logo-link">
        <span class="logo-icon"></span>
        <span class="logo-text">NetProxi</span>
      </a>
    </div>

    <!-- ================= AUTHENTICATED USERS ================= -->
    <ng-container *ngIf="isAuthenticated$ | async; else publicHeader">
      <nav class="nav" [class.active]="menuOpen()">
        <div class="user-info" *ngIf="currentUser$ | async as user">
            <!-- Dynamic User Info -->
          <ng-container [ngSwitch]="currentUserType$ | async">
            <span *ngSwitchCase="'company'" class="company-name">
              <i class="fas fa-building"></i>
              {{ user.name }}
            </span>
            <span *ngSwitchCase="'client'" class="client-name">
              <i class="fas fa-user"></i>
              {{ user.firstName }} {{ user.lastName }}
            </span>
            <span *ngSwitchCase="'employee'" class="employee-name">
              <i class="fas fa-user-tie"></i>
              {{ user.name }}
            </span>
          </ng-container>

          <!-- Boutons -->
          <a *ngIf="(currentUserType$ | async) === 'client'" 
             routerLink="/client/dashboard" 
             class="btn-dashboard">
            Mon espace
          </a>

          <a *ngIf="(currentUserType$ | async) === 'company'" 
             routerLink="/company-admin" 
             class="btn-dashboard">
            Espace entreprise
          </a>

          <a *ngIf="(currentUserType$ | async) === 'employee'" 
             routerLink="/employee-dashboard" 
             class="btn-dashboard">
            Mon espace
          </a>

          <button class="btn-logout" (click)="logout()">
            <i class="fas fa-sign-out-alt"></i>
            Déconnexion
          </button>
        </div>
      </nav>
    </ng-container>

    <!-- ================= PUBLIC USERS ================= -->
    <ng-template #publicHeader>
      <nav class="nav" [class.active]="menuOpen()">
        <a routerLink="/" routerLinkActive="active" class="nav-link">Accueil</a>
        <a routerLink="/companies" routerLinkActive="active" class="nav-link">Entreprises</a>
      </nav>

      <div class="actions">
        <button class="btn-login" (click)="openLogin()">
          <i class="fas fa-sign-in-alt"></i>
          Connexion
        </button>
        <button class="btn-signup" (click)="openSignup()">
          <i class="fas fa-user-plus"></i>
          Inscription
        </button>
      </div>
    </ng-template>

    <!-- Modals -->
    <app-login-page
      *ngIf="showLogin"
      (close)="closeLogin()">
    </app-login-page>

    <app-register-page
      *ngIf="showSignup"
      (close)="closeSignup()">
    </app-register-page>

    <!-- Theme Toggle -->
    <div class="theme-toggle">
      <select
        [value]="currentTheme"
        (change)="setTheme($any($event.target).value)"
        aria-label="Select theme">
        <option value="system">System</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </div>

    <!-- Hamburger menu -->
    <button
      class="menu-toggle"
      (click)="toggleMenu()"
      aria-label="Toggle menu"
      [class.active]="menuOpen()">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>
</header>
