<div class="login-page" (click)="closeModal()">
  <div class="login-card" (click)="$event.stopPropagation()">

        <button class="close-btn" (click)="closeModal()">✖</button>

    <h2>Connexion</h2>

    <div *ngIf="error$ | async as error" class="error-message"> error </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Type de compte</label>
        <select [(ngModel)]="loginData.userType" name="userType">
          <option value="client">Client</option>
          <option value="company">Entreprise</option>
          <option value="employee">Employé</option>
        </select>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="loginData.email" name="email" required />
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" [(ngModel)]="loginData.password" name="password" required />
      </div>

      <button type="submit" [disabled]="loading$ | async">
        {{ (loading$ | async) ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>
  </div>
</div>
