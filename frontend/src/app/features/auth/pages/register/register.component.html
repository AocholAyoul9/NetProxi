<div class="register-page">
  <div class="register-card">
    <button class="close-btn" (click)="closeModal()">✖</button>

    <h2>Créer un compte</h2>

    <div *ngIf="error$ | async as error" class="error-message">{{ error }}</div>
    <div *ngIf="passwordMismatch" class="error-message">Les mots de passe ne correspondent pas</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Type de compte</label>
        <select [(ngModel)]="accountType" name="accountType">
          <option value="client">Client</option>
          <option value="company">Entreprise</option>
        </select>
      </div>

      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" [(ngModel)]="formData.username" name="username" required />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="formData.email" name="email" required />
      </div>

      <!-- PASSWORD FIELD WITH EYE -->
      <div class="form-group">
        <label>Mot de passe</label>
        <div class="password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'"
                 [(ngModel)]="formData.password"
                 name="password"
                 required />
          <button type="button" class="eye-icon" (click)="togglePasswordVisibility('password')">
            <i class="fas" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"></i>
          </button>
        </div>
      </div>

      <!-- CONFIRM PASSWORD FIELD WITH EYE -->
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <div class="password-wrapper">
          <input [type]="showConfirmPassword ? 'text' : 'password'"
                 [(ngModel)]="confirmPassword"
                 name="confirmPassword"
                 required
                 (input)="checkPasswordMatch()" />
          <button type="button" class="eye-icon" (click)="togglePasswordVisibility('confirm')">
            <i class="fas" [class.fa-eye]="!showConfirmPassword" [class.fa-eye-slash]="showConfirmPassword"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Téléphone</label>
        <input type="tel" [(ngModel)]="formData.phone" name="phone" />
      </div>

      <div class="form-group">
        <label>Adresse</label>
        <input type="text" [(ngModel)]="formData.address" name="address" />
      </div>

      <div class="form-group" *ngIf="accountType === 'company'">
        <label>Nom de l'entreprise</label>
        <input type="text" [(ngModel)]="formData.companyName" name="companyName" required />
      </div>

      <button type="submit" [disabled]="(loading$ | async) || passwordMismatch">
        {{ (loading$ | async) ? "Inscription..." : "S'inscrire" }}
      </button>
    </form>
  </div>
</div>
