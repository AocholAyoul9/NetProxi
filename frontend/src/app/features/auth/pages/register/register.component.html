<div class="register-page">
  <div class="register-card">
    <h2>Créer un compte</h2>

    <div *ngIf="error$ | async as error" class="error-message">{{ error }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Type de compte</label>
        <select [(ngModel)]="accountType" name="accountType">
          <option value="client">Client</option>
          <option value="company">Entreprise</option>
        </select>
      </div>

      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" [(ngModel)]="formData.username" name="username" required />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="formData.email" name="email" required />
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" [(ngModel)]="formData.password" name="password" required />
      </div>

      <div class="form-group">
        <label>Téléphone</label>
        <input type="tel" [(ngModel)]="formData.phone" name="phone" />
      </div>

      <div class="form-group">
        <label>Adresse</label>
        <input type="text" [(ngModel)]="formData.address" name="address" />
      </div>

      <button type="submit" [disabled]="loading$ | async">
        {{ (loading$ | async) ? 'Inscription...' : "S'inscrire" }}
      </button>
    </form>
  </div>
</div>
