spring.application.name=netproxi

spring.datasource.url=jdbc:postgresql://dpg-d7vkmv3tqb8s73ff6sg0-a:5432/cleaningdb_0kst
spring.datasource.username=cleaningdb_0kst_user
spring.datasource.password=YOUR_PASSWORD

# HikariCP
spring.datasource.hikari.minimumIdle=5
spring.datasource.hikari.maximumPoolSize=20
spring.datasource.hikari.idleTimeout=300000
spring.datasource.hikari.connectionTimeout=20000
spring.datasource.hikari.maxLifetime=1200000

